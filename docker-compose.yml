services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: 3011
      DATABASE_PATH: data/tasks.db
      FRONTEND_ORIGIN: http://localhost:3000
      OPENAI_MODEL: gpt-4.1-mini
    ports:
      - "3011:3011"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3011
    ports:
      - "3000:3000"
    depends_on:
      - backend
